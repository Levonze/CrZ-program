<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиент для металлической пластины -->
    <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b0b0b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    
    <!-- Фильтр для легкого шума/текстуры металла (опционально) -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
    </filter>

    <!-- Градиент для ржавчины -->
    <radialGradient id="rustGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Основная металлическая пластина -->
  <rect x="50" y="50" width="412" height="412" rx="40" ry="40" fill="url(#metalGradient)" stroke="#555" stroke-width="4" />
  
  <!-- Наложение текстуры металла -->
  <rect x="50" y="50" width="412" height="412" rx="40" ry="40" fill="white" filter="url(#noise)" opacity="0.3" style="mix-blend-mode: overlay;" />

  <!-- Группа ржавчины (правый нижний угол) -->
  <g transform="translate(200, 150)">
    <path d="M100,150 Q130,140 150,160 T180,180 Q190,200 170,220 T140,230 Q110,240 90,210 T80,180 Q70,160 100,150 Z" fill="url(#rustGradient)" stroke="#5c2e0e" stroke-width="2" />
    <path d="M160,120 Q175,115 185,130 T190,150 Q185,165 170,160 T155,145 Z" fill="#cd853f" opacity="0.8" />
    <path d="M60,200 Q75,195 85,210 T90,230 Q85,245 70,240 T55,225 Z" fill="#8b4513" />
    <path d="M190,240 Q205,235 215,250 T220,270 Q215,285 200,280 T185,265 Z" fill="#a0522d" />
    <path d="M130,260 Q145,255 155,270 T160,290 Q155,305 140,300 T125,285 Z" fill="#cd853f" />
  </g>

  <!-- Иконка книги (левый верхний угол) -->
  <g transform="translate(90, 90) scale(1.5)">
    <path d="M10,30 Q10,10 30,10 Q50,10 50,30 L50,50 Q50,40 30,40 Q10,40 10,50 Z" fill="none" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
    <path d="M50,30 Q50,10 70,10 Q90,10 90,30 L90,50 Q90,40 70,40 Q50,40 50,50 Z" fill="none" stroke="#333" stroke-width="3" stroke-linejoin="round"/>
    <line x1="50" y1="10" x2="50" y2="50" stroke="#333" stroke-width="3" />
  </g>

  <!-- Иконка академической шапочки (правый верхний угол) -->
  <g transform="translate(300, 70) scale(1.4)">
    <!-- Основная часть шапки -->
    <path d="M10,40 L50,20 L90,40 L50,60 Z" fill="#003366" stroke="#002244" stroke-width="2" />
    <!-- Основание (тюбетейка) -->
    <path d="M25,40 L75,40 L75,65 L25,65 Z" fill="#003366" stroke="#002244" stroke-width="2" />
    <!-- Кисточка -->
    <circle cx="90" cy="20" r="5" fill="#003366" />
    <line x1="90" y1="20" x2="90" y2="45" stroke="#003366" stroke-width="2" />
  </g>
</svg>